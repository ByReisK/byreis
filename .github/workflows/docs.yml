name: Docs

# Build the MkDocs site on every change to the docs sources, and deploy it to
# GitHub Pages from main. The --strict build doubles as a link/nav check.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow only one concurrent deployment; do not cancel an in-progress run so a
# deploy always finishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt
      - name: Build site (strict)
        run: mkdocs build --strict
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
