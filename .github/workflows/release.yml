name: Release

on:
  push:
    tags:
      - "v*"

# Force Node.js-20-based JavaScript actions (actions/checkout@v4, actions/setup-go@v5,
# softprops/action-gh-release@v2) to run on the runner-provided Node 24, ahead of
# the 2026-06-02 GitHub-enforced default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # The shipgate job is reproduced here (not just referenced) so release cannot
  # proceed without it. The 'needs: [shipgate]' below is the hard gating
  # mechanism: there is no manual-override path. The full behavioral suite is
  # filled in later; today the job runs the structured stub, but the gating
  # wiring is real and non-bypassable.
  shipgate:
    name: Ship Gate (BLOCKS RELEASE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run ship-gate suite (asymmetric-access guarantee)
        # Non-skippable. A red result means the build does not ship, regardless
        # of any other green results.
        run: go test -v -race -tags shipgate -timeout=120s ./internal/core/usecase/
      - name: Run positive-composition regression guard (D-1, S1 wiring)
        # Covers the internal/app positive-composition tests that assert
        # BuildProductionDeps returns non-nil Submitter/Reviewer/Merger in a
        # fully-configured ADMIN environment. Not covered by the core/usecase
        # step above; this step closes that gap so a typed-nil regression in
        # the composition root is caught at release time, not only on PR CI.
        run: go test -v -race -tags shipgate -timeout=120s -run 'TestD1_PositiveComposition|TestV35_|TestS1_|TestS3_' ./internal/app/

  # The docgate job is the second non-bypassable gating leg, paired with shipgate.
  # It runs the forward-secrecy warning verbatim cross-check and the
  # release-workflow wiring assertion (which itself verifies this job remains in
  # the release job's needs: array). A red docgate result blocks release via
  # needs: [shipgate, docgate] on the release job; there is no manual-override
  # path.
  docgate:
    name: Doc Gate (BLOCKS RELEASE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run docgate suite (forward-secrecy warning + release-wiring)
        # Non-skippable. A red result means the build does not ship.
        # Both packages are run UNFILTERED (no -run flag) so every current and
        # future docgate-tagged test in either package auto-gates without
        # requiring a workflow edit:
        # (a) rotate leg: forward-secrecy warning verbatim and release-wiring
        #     integrity (the wiring assertion itself verifies this job stays in
        #     the release needs array).
        # (b) CLI leg: request-access honesty contract, admin-warning verbatim
        #     emission, rotate CLI emission, and doctor rotation-history verbatim
        #     fixture tests.
        run: go test -v -race -tags docgate -timeout=120s ./internal/core/usecase/rotate/ ./internal/cli/

  release:
    name: Release
    runs-on: ubuntu-latest
    # The release job has needs: [shipgate, docgate] with no manual-override
    # path. A red result on either gate prevents this job from running. The
    # docgate suite itself contains a structural test
    # (TestReleaseWorkflow_DocgateGateWiringIntact) that asserts BOTH entries
    # remain in this array; dropping either would surface inside docgate.
    needs: [shipgate, docgate]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Assert release build carries no testhook / docgate / build-influencing env
        # Fail-closed half of the testhook control gate on the RELEASE path.
        # The symbol-absence half is the Go AST test TestShippedSurface_*
        # (run by the shipgate job above under DEFAULT tags, which gates this
        # release via needs: [shipgate, docgate]). This step asserts the
        # release build invocation itself is clean — no -tags testhook, no
        # -tags docgate, and no GOFLAGS/GOEXPERIMENT that could smuggle a tag.
        run: |
          set -euo pipefail
          if [ -n "${GOFLAGS:-}" ]; then
            echo "::error::GOFLAGS is set ('${GOFLAGS}') for the release build. It must be unset: it can inject -tags testhook or -tags docgate out of band."
            exit 1
          fi
          if [ -n "${GOEXPERIMENT:-}" ]; then
            echo "::error::GOEXPERIMENT is set ('${GOEXPERIMENT}') for the release build. It must be unset for a reproducible release."
            exit 1
          fi
          RELEASE_CMDS='go build -ldflags LDFLAGS -o byreis-OS-ARCH ./cmd/byreis'
          case "$RELEASE_CMDS" in
            *testhook*)
              echo "::error::release build invocation contains 'testhook' — the test hook must never be compiled into a released binary."
              exit 1
              ;;
          esac
          case "$RELEASE_CMDS" in
            *docgate*)
              echo "::error::release build invocation contains 'docgate' — the docgate tag must never be compiled into a released binary."
              exit 1
              ;;
          esac
          echo "release build invocation is clean: no -tags testhook, no -tags docgate, GOFLAGS/GOEXPERIMENT unset."
      - name: Build release binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X github.com/ByReisK/byreis/pkg/byreis.Version=${VERSION}"
          GOOS=linux  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o byreis-linux-amd64   ./cmd/byreis
          GOOS=linux  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o byreis-linux-arm64   ./cmd/byreis
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o byreis-darwin-amd64  ./cmd/byreis
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o byreis-darwin-arm64  ./cmd/byreis
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            byreis-linux-amd64
            byreis-linux-arm64
            byreis-darwin-amd64
            byreis-darwin-arm64
          generate_release_notes: true
