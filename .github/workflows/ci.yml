name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Assert shipped build carries no testhook / docgate / build-influencing env
        # Fail-closed half of the testhook control gate. The symbol-absence
        # half is the Go AST test TestShippedSurface_* in
        # internal/core/registry/countertypes (run by the 'test' and 'shipgate'
        # jobs under DEFAULT tags). This step asserts the BUILD invocation
        # itself is clean: no -tags testhook, no -tags docgate, and no
        # GOFLAGS/GOEXPERIMENT that could smuggle a tag or alter codegen.
        # The docgate-clean check mirrors the testhook-clean precedent: the
        # docgate tag is a non-default sibling lane that compiles only test
        # files and must never appear in a shipped/release build invocation.
        run: |
          set -euo pipefail
          if [ -n "${GOFLAGS:-}" ]; then
            echo "::error::GOFLAGS is set ('${GOFLAGS}') for the shipped build step. It must be unset: it can inject -tags testhook or -tags docgate out of band."
            exit 1
          fi
          if [ -n "${GOEXPERIMENT:-}" ]; then
            echo "::error::GOEXPERIMENT is set ('${GOEXPERIMENT}') for the shipped build step. It must be unset for a reproducible shipped build."
            exit 1
          fi
          BUILD_CMD='go build ./cmd/byreis'
          case "$BUILD_CMD" in
            *testhook*)
              echo "::error::shipped build invocation contains 'testhook' — the test hook must never be compiled into a shipped binary."
              exit 1
              ;;
          esac
          case "$BUILD_CMD" in
            *docgate*)
              echo "::error::shipped build invocation contains 'docgate' — the docgate tag must never be compiled into a shipped binary."
              exit 1
              ;;
          esac
          echo "shipped build invocation is clean: no -tags testhook, no -tags docgate, GOFLAGS/GOEXPERIMENT unset."
      - name: Build
        run: go build ./cmd/byreis

  test:
    name: Test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run tests with race detector (default tags)
        # Runs under DEFAULT tags. This is where the shipped-surface mechanical
        # guard (TestShippedSurface_* in internal/core/registry/countertypes)
        # executes: it drives `go list -tags` itself, so it inspects the
        # testhook surface WITHOUT this job compiling the hook into anything.
        run: go test -race -timeout=120s ./...

  testhook-negatives:
    name: Counter-decision negatives (-tags testhook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run testhook-gated decision-table negatives with race detector
        # This job is the ONLY place the testhook tag is compiled, and it
        # compiles ONLY tests (go test), never a shipped/release binary. It is
        # paired with the build job's clean-invocation assertion and the
        # default-tag TestShippedSurface_* guard: the tag is exercised in TEST
        # CI and provably excluded from BUILD/RELEASE CI.
        #
        # Scope:
        #   - internal/core/crypto/verify: signed-commit verify negatives
        #   - internal/core/registry/countertypes: counter-decision negatives
        #     (ErrReplay vs ErrCounterReconcile vs OK, H-1 lost-intent row)
        #   - internal/app, internal/cli: wiring-layer B3e tests
        #   - All other packages with testhook-gated tests run here too.
        run: go test -race -timeout=120s -tags testhook ./...

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  allowlist:
    name: Import Allowlist (closed-world gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run allowlist test (positive + negative) — Go test is authoritative
        # The Go test is the single authoritative import-allowlist gate. A prior
        # bash script was retired deliberately: two gates that can disagree are
        # themselves a defect. A non-zero exit is a hard failure, and a gate that
        # cannot run must fail loudly rather than exit 0 silently.
        # GOOS=linux GOARCH=amd64 is pinned so the transitive-dep set evaluated
        # here is identical on every dev host and in CI. The allowlist is the
        # platform-union satisfying linux+windows+darwin.
        # Targets:
        #   - internal/core/crypto/encrypt  (contributor encrypt allowlist)
        #   - internal/core/usecase/submit  (the Submit compilation unit only,
        #                                    not the whole usecase package)
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go test -v -race -run TestAllowlist \
            ./internal/core/crypto/encrypt/ \
            ./internal/core/usecase/submit/

  shipgate:
    name: Ship Gate (asymmetric-access guarantee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run ship-gate suite (asymmetric-access guarantee)
        # This job is non-skippable. A red result here blocks the release
        # pipeline via the 'needs: [shipgate]' dependency in release.yml: there
        # is no manual-override path. It currently runs the structured stub; the
        # full behavioral suite is filled in later. Target is the parent usecase
        # package where the suite lives — the Submit sub-package import allowlist
        # is covered by the allowlist job above.
        run: go test -v -race -tags shipgate -timeout=120s ./internal/core/usecase/
      - name: Run positive-composition regression guard (D-1, S1 wiring)
        # Covers the internal/app positive-composition tests that assert
        # BuildProductionDeps returns non-nil Submitter/Reviewer/Merger in a
        # fully-configured ADMIN environment. Not covered by the core/usecase
        # step above; this step closes that gap so a typed-nil regression in
        # the composition root is caught in CI, not only locally.
        run: go test -v -race -tags shipgate -timeout=120s -run 'TestD1_PositiveComposition|TestV35_|TestS1_|TestS3_' ./internal/app/

  docgate:
    name: Doc Gate (forward-secrecy warning + release-wiring)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run docgate suite (verbatim forward-secrecy warning + release-wiring integrity)
        # This job is non-skippable on CI; the matching release-pipeline job in
        # release.yml is the release-blocking half (needs both shipgate and
        # docgate). Both packages are run UNFILTERED (no -run flag) so every
        # current and future docgate-tagged test in either package auto-gates
        # without requiring a workflow edit:
        # (a) rotate leg: forward-secrecy warning verbatim, release-wiring
        #     integrity, and positioning-honesty release-notes rings.
        # (b) CLI leg: request-access honesty contract, admin-warning verbatim
        #     emission, rotate CLI emission, and doctor rotation-history verbatim
        #     fixture tests.
        run: go test -v -race -tags docgate -timeout=120s ./internal/core/usecase/rotate/ ./internal/cli/

  tui-core-ceiling:
    name: TUI Core Ceiling (zero-new-core gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Assert no new exported core symbols or mode-matrix entries from TUI work
        # This gate enforces the zero-new-core ceiling (ADR-0017 D3): the
        # exported-symbol set of internal/core/** must be a subset of the
        # committed baseline frozen at 393 symbols, and the (command, mode)
        # allowed-pair set of the permission matrix must be unchanged.
        # Any new symbol or matrix entry from TUI work fails the gate.
        # The baseline is reseeded only when a reviewed, non-TUI change
        # legitimately adds core symbols; a TUI slice must never trigger a
        # silent baseline bump.
        # A negative self-test baked into ceiling_test.go proves the checker
        # fires on a real addition (the gate cannot silently pass).
        run: go test -race -timeout=120s -tags ceiling -run 'TestTUICeiling' ./internal/tui/

  docgate-tag-isolation:
    name: Doc Gate tag isolation (docgate does not pull testhook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Assert -tags docgate does not compile testhook.go (tag isolation CI half)
        # The shipped_surface_test.go default-tag AST guard asserts the
        # symbol-absence half. This step is the CI parity check: under
        # -tags docgate, testhook.go must remain in IgnoredGoFiles (i.e. its
        # `//go:build testhook` constraint is unsatisfied). A docgate tag that
        # transitively pulled testhook would silently compile crash-injection
        # hooks into the docgate compilation unit; this step makes that a CI
        # red.
        run: |
          set -euo pipefail
          OUT="$(go list -tags docgate -f '{{range .GoFiles}}GO:{{.}}{{"\n"}}{{end}}{{range .IgnoredGoFiles}}IG:{{.}}{{"\n"}}{{end}}' ./internal/core/usecase/rotate/)"
          echo "$OUT"
          if echo "$OUT" | grep -q '^GO:testhook.go$'; then
            echo "::error::testhook.go is in GoFiles under -tags docgate — the docgate tag is transitively pulling the testhook lane."
            exit 1
          fi
          echo "docgate tag isolation OK: testhook.go is not compiled under -tags docgate."
