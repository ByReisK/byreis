name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Assert shipped build carries no testhook / build-influencing env
        # Fail-closed half of the testhook control gate (ADR-0006 / DESIGN
        # §7.2-D1). The symbol-absence half is the Go AST test
        # TestShippedSurface_* in internal/core/registry/countertypes (run by
        # the 'test' and 'shipgate' jobs under DEFAULT tags). This step asserts
        # the BUILD invocation itself is clean: no -tags testhook, and no
        # GOFLAGS/GOEXPERIMENT that could smuggle a tag or alter codegen.
        run: |
          set -euo pipefail
          if [ -n "${GOFLAGS:-}" ]; then
            echo "::error::GOFLAGS is set ('${GOFLAGS}') for the shipped build step. It must be unset: it can inject -tags testhook out of band."
            exit 1
          fi
          if [ -n "${GOEXPERIMENT:-}" ]; then
            echo "::error::GOEXPERIMENT is set ('${GOEXPERIMENT}') for the shipped build step. It must be unset for a reproducible shipped build."
            exit 1
          fi
          BUILD_CMD='go build ./cmd/byreis'
          case "$BUILD_CMD" in
            *testhook*)
              echo "::error::shipped build invocation contains 'testhook' — the test hook must never be compiled into a shipped binary."
              exit 1
              ;;
          esac
          echo "shipped build invocation is clean: no -tags testhook, GOFLAGS/GOEXPERIMENT unset."
      - name: Build
        run: go build ./cmd/byreis

  test:
    name: Test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run tests with race detector (default tags)
        # Runs under DEFAULT tags. This is where the shipped-surface mechanical
        # guard (TestShippedSurface_* in internal/core/registry/countertypes)
        # executes: it drives `go list -tags` itself, so it inspects the
        # testhook surface WITHOUT this job compiling the hook into anything.
        run: go test -race -timeout=120s ./...

  testhook-negatives:
    name: Counter-decision negatives (-tags testhook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run testhook-gated decision-table negatives with race detector
        # This job is the ONLY place the testhook tag is compiled, and it
        # compiles ONLY tests (go test), never a shipped/release binary. It is
        # paired with the build job's clean-invocation assertion and the
        # default-tag TestShippedSurface_* guard: the tag is exercised in TEST
        # CI and provably excluded from BUILD/RELEASE CI.
        #
        # Scope:
        #   - internal/core/crypto/verify: signed-commit verify negatives
        #   - internal/core/registry/countertypes: counter-decision negatives
        #     (ErrReplay vs ErrCounterReconcile vs OK, H-1 lost-intent row)
        #   - internal/app, internal/cli: wiring-layer B3e tests
        #   - All other packages with testhook-gated tests run here too.
        run: go test -race -timeout=120s -tags testhook ./...

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  allowlist:
    name: Import Allowlist (closed-world gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run allowlist test (positive + negative) — Go test is authoritative
        # The Go test is the single authoritative import-allowlist gate. A prior
        # bash script was retired deliberately: two gates that can disagree are
        # themselves a defect. A non-zero exit is a hard failure, and a gate that
        # cannot run must fail loudly rather than exit 0 silently.
        # GOOS=linux GOARCH=amd64 is pinned so the transitive-dep set evaluated
        # here is identical on every dev host and in CI. The allowlist is the
        # platform-union satisfying linux+windows+darwin.
        # Targets:
        #   - internal/core/crypto/encrypt  (contributor encrypt allowlist)
        #   - internal/core/usecase/submit  (the Submit compilation unit only,
        #                                    not the whole usecase package)
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go test -v -race -run TestAllowlist \
            ./internal/core/crypto/encrypt/ \
            ./internal/core/usecase/submit/

  shipgate:
    name: Ship Gate (asymmetric-access guarantee)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - name: Run ship-gate suite (asymmetric-access guarantee)
        # This job is non-skippable. A red result here blocks the release
        # pipeline via the 'needs: [shipgate]' dependency in release.yml: there
        # is no manual-override path. It currently runs the structured stub; the
        # full behavioral suite is filled in later. Target is the parent usecase
        # package where the suite lives — the Submit sub-package import allowlist
        # is covered by the allowlist job above.
        run: go test -v -race -tags shipgate -timeout=120s ./internal/core/usecase/
