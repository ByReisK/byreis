site_name: byreis
site_description: >-
  Friendly GitOps secrets management with asymmetric access control — contributors
  submit secrets they can never read; only admins decrypt.
site_url: https://byreisk.github.io/byreis/
site_author: byreis maintainers

repo_name: ByReisK/byreis
repo_url: https://github.com/ByReisK/byreis
edit_uri: edit/main/docs/

copyright: Licensed under Apache 2.0

theme:
  name: material
  language: en
  custom_dir: overrides
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
    logo: material/key-chain-variant
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Dark (slate + amber) is the default — terminal/dev vibe.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    # navigation.instant disabled — mkdocs-static-i18n's contextual
    # language switcher is incompatible with it.
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

extra_css:
  - assets/extra.css

# Keep the GitHub folder readme out of the rendered site (index.md is the home).
exclude_docs: |
  README.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: vi
          name: Tiếng Việt
          build: true
          site_name: byreis
          site_description: >-
            GitOps secrets management thân thiện với asymmetric access control —
            contributor submit secrets nhưng không bao giờ đọc được; chỉ admin
            decrypt.
          nav_translations:
            Home: Trang chủ
            Getting started: Bắt đầu
            Features: Tính năng
            Security model: Mô hình bảo mật
            User guide: Hướng dẫn sử dụng
            Walkthrough: Walkthrough thực tế
            Runbooks: Runbook
            Rotating the recipient set: Rotate recipient set
            Requesting access: Yêu cầu access
            Reference: Tham khảo
            Forward secrecy: Forward secrecy
            Release notes: Release notes

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Features: features.md
  - Security model: security-model.md
  - User guide: guide.md
  - Walkthrough: walkthrough.md
  - Runbooks:
      - Rotating the recipient set: rotation-runbook.md
      - Requesting access: request-access-runbook.md
  - Reference:
      - Forward secrecy: forward-secrecy.md
  - Release notes:
      - v0.9.0: release-notes-v0.9.md
      - v0.8.0: release-notes-v0.8.md
      - v0.7.0: release-notes-v0.7.md
      - v0.6.0: release-notes-v0.6.md
      - v0.5.0: release-notes-v0.5.md
      - v0.4.0: release-notes-v0.4.md
      - v0.3.1: release-notes-v0.3.1.md
      - v0.3.0: release-notes-v0.3.md
      - v0.2.0: release-notes-v0.2.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ByReisK/byreis
      name: byreis on GitHub
